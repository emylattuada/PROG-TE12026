<html>
    <head>
        <title>Tablas y Formularios</title>
        <body>
            <center>
                <h1 style="color: rgba(0, 119, 255, 0.842);" class="title">Tablas HTML</h1>
                <table style="border-style: solid">
                    <tr>
                        <th>A</th>
                        <th>B</th>
                        <th>C</th>
                    </tr>
                    <tr>
                        <td>A1</td>
                        <td>B1</td>
                        <td>C1</td>
                    </tr>
                    <tr>
                        <td>A2</td>
                        <td>B2</td>
                        <td>C2</td>
                    </tr>
                </table>
                <h1 style="color: rgba(0, 119, 255, 0.842);" class="title">Formularios HTML</h2>
                <form>
                    <label for="Texto">Texto</label>
                    <input type="text" id="Texto" name="Texto"><br>
                    <label for="Number">Number</label>
                    <input type="number" id="Number" name="Number"><br>
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password"><br>
                    <label for="email">Email</label>
                    <input type="email" id="email" name="email"><br>
                    <label for="date">Date</label>
                    <input type="date" id="date" name="date"><br>
                    <label for="Medias">Medias de color</label>
                    <select name="Medias" id="medias">
                        <option value="Roja">Roja</option>
                        <option value="Verde">Verde</option>
                        <option value="Azul">Azul</option>
                    </select><br>
                    <label for="checkbox">Si</label>
                    <input type="checkbox" id="checkboxSi" name="checkbox">
                     <label for="checkbox">No</label>
                    <input type="checkbox" id="checkboxNo" name="checkbox">
                     <label for="checkbox">Quizas</label>
                    <input type="checkbox" id="checkboxQuizas" name="checkbox"><br>
                    <label for="Opcion1"></label>
                    <input type="radio" id="opcion1" name="eleccion" value="A">Opcion A
                    </label>
                    <label for="Opcion2"></label>
                    <input type="radio" id="opcion2" name="eleccion" value="B">Opcion B
                    </label><br>
                    <button type="button" onclick="alert('Me diste click')">Clickeame!</button>
                    <button type="reset">Reset</button>
                </form>

            </center>
        </body>
</html>
